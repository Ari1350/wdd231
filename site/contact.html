<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact | Crochet Creations</title>
  <meta name="description" content="Get in touch with Crochet Creations.">
  <link rel="stylesheet" href="styles/site.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script defer src="scripts/site.js"></script>
</head>
<body>
  <header>
    <div class="logo">Crochet Creations</div>
    <nav>
      <ul>
        <li><a href="site.html">Welcome</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

    <main>
      <header style="margin-top: 1rem; background-color: #50C878;">
        <span class="logo" style="color: white; font-size: 1.2rem;">Panel Privado de la Dueña 🛠️</span>
        <nav>
          <ul>
            <li><a href="contact.html" class="active" style="color: white;">1. Anotar Pedido</a></li>
            <li><a href="pedidos.html" style="color: #1b4d2e;">2. Ver Lista de Pedidos</a></li>
          </ul>
        </nav>
      </header>

      <section class="formulario">
        <h2>Registro de Nuevo Pedido</h2>
        <p style="color: #1b4d2e; margin-bottom: 1.5rem;">Escribe los datos de la venta coordinada por WhatsApp para guardarla en el sistema.</p>
        
        <form id="adminForm">
          <label for="clienteName">Nombre del Cliente:</label>
          <input type="text" id="clienteName" required placeholder="Ej. María Pérez">

          <label for="productoSelect">Producto Solicitado:</label>
          <input type="text" id="productoSelect" required placeholder="Ej. Vaquita de Crochet">

          <label for="metodoPago">Método de Pago:</label>
          <input type="text" id="metodoPago" required placeholder="Ej. QR o Efectivo">

          <label for="estadoPedido">Estado Inicial del Pago:</label>
          <input type="text" id="estadoPedido" required placeholder="Ej. Realizado o Pendiente">

          <button type="submit">Guardar Pedido en Lista</button>
        </form>
      </section>
    </main>


</main>
  <footer class="site-footer">
    <div class="container">
      <p>© <span id="currentyear"></span> Crochet Creations 🌸Guadalupe Arias🌸, Bolivia🇧🇴</p>
      <p id="lastModified"></p>
    </div>
  </footer>

</body>
</html>
