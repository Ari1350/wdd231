<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pedidos | Panel Administrativo</title>
    <link rel="stylesheet" href="styles/site.css">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <script defer src="scripts/admin.js"></script>
</head>
<body>
  <header style="background-color: #50C878;">
    <span class="logo" style="color: white; font-size: 1.2rem;">Panel de Control Administrativo 🌿</span>
    <nav>
      <ul>
        <li><a href="contact.html" class="active" style="color: white;">1. Anotar Pedido</a></li>
        <li><a href="pedidos.html" style="color: #1b4d2e;">2. Lista de Entregas</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="formulario" style="margin-top: 2rem;">
      <h2>Registro de Nueva Venta</h2>
      <p style="color: #1b4d2e; margin-bottom: 1.5rem;">Seleccione los datos de la orden coordinada por WhatsApp para ingresarla al sistema de control.</p>
      
      <form id="adminForm">
        <div class="form-group">
          <label for="clienteName">Nombre del Cliente:</label>
          <input type="text" id="clienteName" required placeholder="Ej. María Pérez">
        </div>

        <div class="form-group">
          <label for="productoSelect">Producto Vendido:</label>
          <select id="productoSelect" style="width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #C1E1C1; border-radius: 6px; color: #1b4d2e; font-family: inherit; font-size: 1rem; background-color: white;" required>
              <option value="Vaquita de Crochet">Vaquita de Crochet (Bs. 45.00)</option>
              <option value="Pollito de Crochet">Pollito de Crochet (Bs. 25.00)</option>
              <option value="Abejita de Crochet">Abejita de Crochet (Bs. 30.00)</option>
              <option value="Carpincho de Crochet">Carpincho de Crochet (Bs. 50.00)</option>
              <option value="Girasoles de Crochet">Girasoles de Crochet (Bs. 35.00)</option>
              <option value="Rosas de Crochet">Rosas de Crochet (Bs. 40.00)</option>
              <option value="Tulipanes de Crochet">Tulipanes de Crochet (Bs. 35.00)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="metodoPago">Método de Pago:</label>
          <select id="metodoPago" style="width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #C1E1C1; border-radius: 6px; color: #1b4d2e; font-family: inherit; font-size: 1rem; background-color: white;" required>
              <option value="QR">Código QR (BCP / Mercantil)</option>
              <option value="Efectivo">Efectivo (Contra entrega)</option>
              <option value="Transferencia">Transferencia Bancaria</option>
          </select>
        </div>

        <div class="form-group">
          <label for="estadoPedido">Estado de la Transacción:</label>
          <select id="estadoPedido" style="width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #C1E1C1; border-radius: 6px; color: #1b4d2e; font-family: inherit; font-size: 1rem; background-color: white;" required>
              <option value="Completado">✅ Realizado / Pagado</option>
              <option value="Pendiente">⏳ Pendiente de Pago</option>
          </select>
        </div>

        <button type="submit" style="background-color: #1b4d2e;">Sincronizar y Registrar Venta</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© Panel Operativo — Sistema de Gestión Relacional</p>
    </div>
  </footer>
</body>
</html>
